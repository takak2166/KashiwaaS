version: '3.8'
services:
  app:
    build: .
    volumes:
      - ./:/app
    environment:
      - TZ=Asia/Tokyo
    depends_on:
      - elasticsearch
  
  # Dev-oriented template: security off and host port published. Do not expose :9200 to the internet
  # or reuse this compose file as-is for production (enable auth/TLS and restrict bind addresses).
  elasticsearch:
    build: ./elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
  
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
  
  chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
    environment:
      - SE_NODE_MAX_SESSIONS=4
    shm_size: '2g'

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"

  bot:
    build: .
    command: ["poetry", "run", "python", "-m", "src.bot.kashiwaas"]
    environment:
      - TZ=Asia/Tokyo
    env_file:
      - .env
    depends_on:
      - valkey
    restart: unless-stopped

  kashiwaas-mattermost:
    profiles: ["mattermost"]
    build: .
    command: ["poetry", "run", "python", "-m", "src.bot.kashiwaas_mattermost"]
    environment:
      - TZ=Asia/Tokyo
    env_file:
      - .env
    depends_on:
      - valkey
    restart: unless-stopped

volumes:
  es_data: