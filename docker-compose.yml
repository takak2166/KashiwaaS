services:
  app:
    build: .
    volumes:
      - ./:/app
    environment:
      - TZ=Asia/Tokyo
    depends_on:
      elasticsearch:
        condition: service_healthy
  
  elasticsearch:
    build: ./elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
  
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 36
      start_period: 120s
  
  chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
    environment:
      - SE_NODE_MAX_SESSIONS=4
    shm_size: '2g'

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"

  bot:
    build: .
    command: ["poetry", "run", "python", "-m", "src.bot.kashiwaas"]
    environment:
      - TZ=Asia/Tokyo
    env_file:
      - .env
    depends_on:
      - valkey
    restart: unless-stopped

volumes:
  es_data: