name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: |
          pip install poetry==2.3.4

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run linting
        run: make lint
        env:
          # Minimal env so load_config() does not get None for required fields when tests import app modules
          SLACK_API_TOKEN: ""
          SLACK_CHANNEL_ID: ""
          SLACK_CHANNEL_NAME: ""
          ELASTICSEARCH_HOST: ""
          KIBANA_HOST: ""
          SELENIUM_HOST: ""

      - name: Run tests
        run: make test
        env:
          SLACK_API_TOKEN: ""
          SLACK_CHANNEL_ID: ""
          SLACK_CHANNEL_NAME: ""
          ELASTICSEARCH_HOST: ""
          KIBANA_HOST: ""
          SELENIUM_HOST: ""

      - name: Bot startup smoke check
        run: |
          poetry run python - <<'PY'
          from unittest.mock import patch

          from src.bot import kashiwaas
          from src.utils.config import load_config

          with patch.object(kashiwaas, "App") as mock_app:
              cfg = load_config()
              app = kashiwaas.create_app(cfg)
              assert app is not None
              assert mock_app.called
          PY
        env:
          SLACK_BOT_TOKEN: "xoxb-dummy"
          CURSOR_API_KEY: "dummy"
          CURSOR_SOURCE_REPOSITORY: "https://github.com/takak2166/KashiwaaS"

  dry-run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Compose
        run: |
          cat << EOF > .env
          SLACK_CHANNEL_NAME=dummy-channel
          ELASTICSEARCH_HOST=http://elasticsearch:9200
          LOG_LEVEL=DEBUG
          KIBANA_HOST=http://kibana:5601
          SELENIUM_HOST=http://chrome:4444
          EOF
          docker compose up --build -d --wait
          docker compose cp .env app:/app/.env
          docker compose ps

      - name: Wait for services to be ready
        run: |
          set -e
          ready=0
          for i in {1..30}; do
            if docker compose exec -T app curl -fsS http://elasticsearch:9200/ >/dev/null 2>&1; then
              echo "Elasticsearch is available"
              ready=1
              break
            fi
            echo "Elasticsearch is unavailable - sleeping... $i"
            sleep 2
          done
          if [[ "$ready" -ne 1 ]]; then
            echo "Elasticsearch did not become ready in time"
            docker compose ps
            exit 1
          fi

      - name: Setup indices and dashboards
        run: |
          docker compose exec -T app poetry run python scripts/setup_indices.py --channel dummy-channel
          docker compose exec -T app poetry run python scripts/import_kibana_objects.py --overwrite

      - name: Run fetch command with dummy data
        run: docker compose exec -T app poetry run python -m src.cli fetch --dummy

      - name: Dry-run report command
        run: |
          docker compose exec -T app poetry run python -m src.cli report --type daily --channel dummy-channel --dry-run
          docker compose exec -T app poetry run python -m src.cli report --type weekly --channel dummy-channel --dry-run

      - name: Clean up
        if: always()
        run: |
          docker compose -f docker-compose.yml down --rmi all --volumes --remove-orphans
          rm .env

  notify-failure:
    environment: notification
    needs: [lint_and_test, dry-run]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.27.1
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            :x: CI Pipeline Failed
            *Repository:* ${{ github.repository }}
            *Workflow:* ${{ github.workflow }}
            *Branch:* ${{ github.ref }}
            *Commit:* ${{ github.sha }}
            *Failed Job:* ${{ needs.lint_and_test.result == 'failure' && 'lint_and_test' || 'dry-run' }}
            *View Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
